# Experiment configuration
# Run with: python run_experiment.py experiments/example.yaml
# All runs are tracked under the single "code-summarization" MLflow experiment.

method: exact_copy            # key in REGISTRY in src/mas_code_sum/methods/__init__.py

languages:
  - python
  - java
  # - javascript
  # - go
  # - php
  # - ruby

split: test
max_samples: 100              # max samples per project; set to null for all
num_runs: 1                   # call each sample N times and average metrics for stability
